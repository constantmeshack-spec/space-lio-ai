<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ APP_NAME }} | Register</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
/* --- GENERAL --- */
body {
    background: #0b0018; /* dark base like homepage */
    color: white;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
}

/* --- CONTAINER --- */
.container {
    max-width: 500px;
    margin: 60px auto;
    padding: 30px;
    background: #140030; /* same as feature boxes */
    border: 1px solid #2de2e6; /* neon border */
    border-radius: 12px;
    box-shadow: 0 0 20px rgba(45, 226, 230, 0.3);
}

/* --- HEADINGS --- */
h1, h2, h3, h4 {
    color: #7cf7ff; /* light cyan, like hero and headings */
    text-align: center;
    margin-bottom: 20px;
}
h5, h6 {
    color: #d4d4ff; /* light lavender for subheadings */
    text-align: center;
    margin-bottom: 15px;
}

/* --- LABELS --- */
label {
    color: #d4d4ff;
}

/* --- INPUT FIELDS --- */
.form-control {
    background: #12002b; /* dark purple field */
    color: white;
    border: 1px solid #2de2e6; /* cyan border */
    border-radius: 8px;
    padding: 10px;
}
.form-control:focus {
    background: #140030;
    border-color: #7b2ff7; /* purple glow on focus */
    outline: none;
    box-shadow: 0 0 8px #2de2e6, 0 0 12px #7b2ff7;
}

/* --- BUTTONS --- */
.btn-register {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: linear-gradient(45deg, #2de2e6, #7b2ff7); /* same as homepage */
    transition: opacity 0.3s;
}
.btn-register:hover {
    opacity: 0.85;
}

/* --- LINK BUTTONS --- */
.btn-link, .btn-home {
    display: inline-block;
    margin-top: 10px;
    color: white;
    text-decoration: none;
    background: linear-gradient(45deg, #2de2e6, #7b2ff7);
    padding: 10px 20px;
    border-radius: 8px;
    transition: opacity 0.3s;
}
.btn-link:hover, .btn-home:hover {
    opacity: 0.85;
}

/* --- ALERT MESSAGES --- */
.alert {
    background: #140030; /* box dark purple */
    color: #d4d4ff;
    border: 1px solid #2de2e6;
    border-radius: 8px;
    padding: 12px 15px;
    margin-bottom: 20px;
}

/* --- RESPONSIVE --- */
@media (max-width: 600px) {
    .container {
        margin: 30px 15px;
        padding: 20px;
    }

    h1, h2 {
        font-size: 22px;
    }

    .form-control {
        font-size: 14px;
        padding: 8px;
    }

    .btn-register, .btn-link {
        font-size: 14px;
        padding: 10px;
    }
}

/* --- FOOTER --- */
footer {
    text-align: center;
    padding: 20px;
    background: #12002b;
    margin-top: 40px;
    border-top: 1px solid #2de2e6;
    color: #d4d4ff;
}
</style>
</head>
<body>

<div class="container">
    <h2>Create an Account</h2>
    <h5>Fill in your details below</h5>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="alert">
          {{ messages[0] }}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST">
        <div class="mb-3">
            <label for="full_name">Full Name</label>
            <input type="text" class="form-control" id="full_name" name="full_name" required>
        </div>
        <div class="mb-3">
            <label for="phone">Phone Number</label>
            <input type="text" class="form-control" id="phone" name="phone" required>
        </div>
        <div class="mb-3">
            <label for="email">Email</label>
            <input type="email" class="form-control" id="email" name="email">
        </div>
        <div class="mb-3">
            <label for="id_number">ID Number</label>
            <input type="text" class="form-control" id="id_number" name="id_number" required>
        </div>
        <div class="mb-3">
            <label for="country">Country</label>
            <input type="text" class="form-control" id="country" name="country" required>
        </div>
        <div class="mb-3">
            <label for="password">Password</label>
            <input type="password" class="form-control" id="password" name="password" required>
        </div>
        <div class="mb-3">
            <label for="confirm_password">Confirm Password</label>
            <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
        </div>
        <div class="mb-3">
            <label for="invitation_code">Invitation Code (Optional)</label>
            <input type="text" class="form-control" id="invitation_code" name="invitation_code">
        </div>

        <button type="submit" class="btn-register">Register</button>
        <a href="{{ url_for('login') }}" class="btn-link">Already have an account? Login</a>
    </br>
        <a href="{{ url_for('index') }}" class="btn-home">Home</a>
    </form>
</div>

<footer>
    © 2026 {{ APP_NAME }} | All Rights Reserved
</footer>

</body>
</html>
